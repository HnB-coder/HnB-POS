                username: "اسم المستخدم",
                createdAt: "تاريخ الإضافة",
                serviceManagement: "إدارة الخدمات",
                allServices: "جميع الخدمات",
                serviceName: "اسم الخدمة",
                type: "النوع",
                edit: "تعديل",
                custom: "مخصص",
                fixed: "ثابت",
                serviceNameEn: "اسم الخدمة (إنجليزي)",
                serviceNameAr: "اسم الخدمة (عربي)",
                icon: "أيقونة",
                generateReports: "إنشاء تقرير",
                barberPerformance: "أداء الحلاقين",
                serviceStatistics: "إحصائيات الخدمات",
                dailySales: "المبيعات اليومية",
                forSelectedPeriod: "للفترة المحددة",
                resetSystem: "إعادة تعيين النظام للحالة الأولية",
                irreversible: "هذا الإجراء لا يمكن التراجع عنه وسيتم حذف جميع البيانات نهائياً.",
                confirmDelete: "هل أنت متأكد من الحذف؟",
                // Custom Service Translations
                customService: "خدمة مخصصة",
                customServiceDesc: "الخدمة غير موجودة؟ أدخل سعر مخصص",
                customPrice: "السعر المخصص ($)",
                enterCustomPrice: "أدخل السعر المخصص",
                logCustomService: "تسجيل خدمة مخصصة",
                customServiceLogged: "تم تسجيل الخدمة المخصصة بنجاح!",
                customServicePlaceholder: "اسم الخدمة (اختياري)",
                customServiceName: "اسم الخدمة (اختياري)"
            }
        };

        // ============== GLOBAL STATE ==============
        let lang = localStorage.getItem('barberLang') || 'en';
        let currentUser = null;
        let userRole = null;
        let userData = null;
        let services = [];
        let allUsers = [];
        let transactions = [];
        let barbers = [];
        let today = new Date().toISOString().split('T')[0];
        let weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        
        // Report Filters
        let reportStartDate = weekAgo;
        let reportEndDate = today;
        let filterBarber = 'all';
        let filterDateStart = weekAgo;
        let filterDateEnd = today;

        // ============== INITIALIZATION ==============
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.body.className = lang === 'ar' ? 'font-ar bg-gray-50' : 'bg-gray-50';

        // ============== LANGUAGE SWITCHING ==============
        window.toggleLang = () => {
            lang = lang === 'en' ? 'ar' : 'en';
            localStorage.setItem('barberLang', lang);
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.body.className = lang === 'ar' ? 'font-ar bg-gray-50' : 'bg-gray-50';
            
            refreshUI();
            
            if (currentUser) {
                const visiblePanel = getVisiblePanel();
                if (visiblePanel === 'dashboard') renderDashboard();
                else if (visiblePanel === 'services') renderServices();
                else if (visiblePanel === 'activity') renderActivityLogs();
                else if (visiblePanel === 'reports') renderReports();
                else if (visiblePanel === 'users') renderUserManagement();
                else if (visiblePanel === 'services-mgmt') renderServiceManagement();
            }
        };

        function getVisiblePanel() {
            if (!document.getElementById('dashboard-panel').classList.contains('hidden')) return 'dashboard';
            if (!document.getElementById('services-panel').classList.contains('hidden')) return 'services';
            if (!document.getElementById('activity-panel').classList.contains('hidden')) return 'activity';
            if (!document.getElementById('reports-panel').classList.contains('hidden')) return 'reports';
            if (!document.getElementById('user-management-panel').classList.contains('hidden')) return 'users';
            if (!document.getElementById('service-management-panel').classList.contains('hidden')) return 'services-mgmt';
            return 'dashboard';
        }

        // Check First Time Setup
        async function checkFirstTimeSetup() {
            try {
                const usersSnapshot = await getDocs(collection(db, "users"));
                const isEmpty = usersSnapshot.empty;
                
                if (isEmpty) {
                    document.getElementById('setup-card').classList.remove('hidden');
                    document.getElementById('login-card').classList.add('hidden');
                } else {
                    document.getElementById('setup-card').classList.add('hidden');
                    document.getElementById('login-card').classList.remove('hidden');
                }
            } catch (error) {
                console.error("Setup check error:", error);
                document.getElementById('login-card').classList.remove('hidden');
            }
        }

        // Auth State Observer
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    userRole = userData.role;
                    currentUser = user;
                    
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('app-view').classList.remove('hidden');
                    
                    document.getElementById('logout-btn').classList.remove('hidden');
                    document.getElementById('admin-tab').classList.toggle('hidden', userRole !== 'admin');
                    document.getElementById('admin-tab2').classList.toggle('hidden', userRole !== 'admin');
                    document.getElementById('admin-tab3').classList.toggle('hidden', userRole !== 'admin');
                    
                    initializeListeners();
                    showPanel('dashboard');
                } else {
                    await signOut(auth);
                    checkFirstTimeSetup();
                }
            } else {
                currentUser = null;
                userRole = null;
                userData = null;
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
                checkFirstTimeSetup();
            }
        });

        // Initialize Firestore Listeners
        function initializeListeners() {
            onSnapshot(collection(db, "services"), (snapshot) => {
                services = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (!document.getElementById('services-panel').classList.contains('hidden')) {
                    renderServices();
                }
                if (!document.getElementById('service-management-panel').classList.contains('hidden')) {
                    renderServiceManagement();
                }
            });

            if (userRole === 'admin') {
                onSnapshot(collection(db, "users"), (snapshot) => {
                    allUsers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    barbers = allUsers.filter(u => u.role === 'barber');
                    if (!document.getElementById('user-management-panel').classList.contains('hidden')) {
                        renderUserManagement();
                    }
                });
            } else {
                onSnapshot(query(collection(db, "users"), where("role", "==", "barber")), (snapshot) => {
                    barbers = snapshot.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                });
            }

            let transactionsQuery;
            if (userRole === 'admin') {
                transactionsQuery = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
            } else if (userRole === 'barber') {
                transactionsQuery = query(
                    collection(db, "transactions"), 
                    where("barberId", "==", currentUser.uid),
                    orderBy("timestamp", "desc")
                );
            } else {
                transactionsQuery = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
            }

            onSnapshot(transactionsQuery, (snapshot) => {
                transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (!document.getElementById('dashboard-panel').classList.contains('hidden')) {
                    renderDashboard();
                }
                if (!document.getElementById('activity-panel').classList.contains('hidden')) {
                    renderActivityLogs();
                }
                if (!document.getElementById('reports-panel').classList.contains('hidden')) {
                    renderReports();
                }
            });
        }

        // ============== AUTHENTICATION ==============
        window.registerFirstAdmin = async () => {
            const email = document.getElementById('setup-email').value;
            const password = document.getElementById('setup-password').value;
            const confirm = document.getElementById('setup-confirm').value;

            if (!email || !password || !confirm) {
                alert(i18n[lang].fillAllFields);
                return;
            }

            if (password !== confirm) {
                alert(i18n[lang].passwordsNoMatch);
                return;
            }

            try {
                const usersSnapshot = await getDocs(collection(db, "users"));
                if (!usersSnapshot.empty) {
                    alert("System already has an admin.");
                    return;
                }

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email: email,
                    name: email.split('@')[0],
                    role: 'admin',
                    createdAt: serverTimestamp(),
                    createdBy: 'self'
                });

                const defaultServices = [
                    { nameEn: "Haircut", nameAr: "حلاقة شعر", price: 120, icon: "✂️" },
                    { nameEn: "Beard Trim", nameAr: "حلاقة دقن", price: 50, icon: "🧔" },
                    { nameEn: "Kids Haircut", nameAr: "حلاقة شعر اطفال", price: 100, icon: "👶" },
                    { nameEn: "American Perm", nameAr: "فرد أمريكي", price: 250, icon: "🔄" },
                    { nameEn: "Hair Coloring", nameAr: "صبغ شعر", price: 200, icon: "🎨" },
                    { nameEn: "Royal Shave", nameAr: "حلاقة ملكي", price: 150, icon: "🪒" }
                ];

                const batch = writeBatch(db);
                defaultServices.forEach(service => {
                    const ref = doc(collection(db, "services"));
                    batch.set(ref, service);
                });
                await batch.commit();

            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        window.doLogin = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                alert(i18n[lang].fillAllFields);
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert(error.message);
            }
        };

        window.doLogout = () => signOut(auth);

        window.showSetup = () => {
            document.getElementById('setup-card').classList.remove('hidden');
            document.getElementById('login-card').classList.add('hidden');
        };

        window.showLogin = () => {
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('login-card').classList.remove('hidden');
        };

        // ============== NAVIGATION ==============
        window.showPanel = (panelId) => {
            const panels = ['dashboard', 'services', 'activity', 'reports', 'users', 'services-mgmt', 'reset'];
            panels.forEach(p => {
                const el = document.getElementById(`${p}-panel`);
                if (el) el.classList.add('hidden');
            });

            const panelMap = {
                'dashboard': 'dashboard-panel',
                'services': 'services-panel',
                'activity': 'activity-panel',
                'reports': 'reports-panel',
                'users': 'user-management-panel',
                'services-mgmt': 'service-management-panel',
                'reset': 'factory-reset-panel'
            };

            const panelToShow = document.getElementById(panelMap[panelId]);
            if (panelToShow) {
                panelToShow.classList.remove('hidden');
                
                if (panelId === 'dashboard') renderDashboard();
                if (panelId === 'services') renderServices();
                if (panelId === 'activity') renderActivityLogs();
                if (panelId === 'reports') renderReports();
                if (panelId === 'users') renderUserManagement();
                if (panelId === 'services-mgmt') renderServiceManagement();
            }
        };

        // ============== DASHBOARD ==============
        function renderDashboard() {
            const todayStr = new Date().toISOString().split('T')[0];
            const weekAgoStr = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            const todayTransactions = transactions.filter(t => t.date === todayStr);
            const weekTransactions = transactions.filter(t => t.date >= weekAgoStr);
            
            const todayRevenue = todayTransactions.reduce((sum, t) => sum + (t.price || 0), 0);
            const todayCustomers = todayTransactions.reduce((sum, t) => sum + (t.customers || 1), 0);
            const todayServices = todayTransactions.length;
            const weekRevenue = weekTransactions.reduce((sum, t) => sum + (t.price || 0), 0);
            const activeBarbersToday = new Set(todayTransactions.map(t => t.barberId)).size;

            let dashboardHtml = '';

            if (userRole === 'admin') {
                dashboardHtml = `
                    <div class="space-y-6">
                        <h2 class="text-2xl font-bold" data-i18n="dashboard">Admin Dashboard</h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                                <div class="text-3xl font-bold text-blue-600">$${todayRevenue}</div>
                                <div class="text-sm text-gray-600" data-i18n="totalRevenue">Total Revenue</div>
                                <div class="text-xs text-gray-400" data-i18n="today">Today</div>
                            </div>
                            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                                <div class="text-3xl font-bold text-green-600">${todayCustomers}</div>
                                <div class="text-sm text-gray-600" data-i18n="totalCustomers">Total Customers</div>
                                <div class="text-xs text-gray-400" data-i18n="today">Today</div>
                            </div>
                            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                                <div class="text-3xl font-bold text-purple-600">${todayServices}</div>
                                <div class="text-sm text-gray-600" data-i18n="totalServices">Total Services</div>
                                <div class="text-xs text-gray-400" data-i18n="today">Today</div>
                            </div>
                            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                                <div class="text-3xl font-bold text-orange-600">${activeBarbersToday}</div>
                                <div class="text-sm text-gray-600" data-i18n="activeBarbers">Active Barbers</div>
                                <div class="text-xs text-gray-400" data-i18n="today">Today</div>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-3xl shadow-sm border">
                            <h3 class="font-bold text-lg mb-4" data-i18n="quickActions">Quick Actions</h3>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                <button onclick="showPanel('users')" class="p-4 bg-blue-50 rounded-2xl text-center hover:bg-blue-100">
                                    <div class="text-2xl mb-2">👥</div>
                                    <div class="text-sm font-bold" data-i18n="manageUsers">Manage Users</div>
                                </button>
                                <button onclick="showPanel('services-mgmt')" class="p-4 bg-green-50 rounded-2xl text-center hover:bg-green-100">
                                    <div class="text-2xl mb-2">✂️</div>
                                    <div class="text-sm font-bold" data-i18n="manageServices">Manage Services</div>
                                </button>
                                <button onclick="showPanel('reports')" class="p-4 bg-purple-50 rounded-2xl text-center hover:bg-purple-100">
                                    <div class="text-2xl mb-2">📊</div>
                                    <div class="text-sm font-bold" data-i18n="viewReports">View Reports</div>
                                </button>
                                <button onclick="showPanel('services')" class="p-4 bg-yellow-50 rounded-2xl text-center hover:bg-yellow-100">
                                    <div class="text-2xl mb-2">📝</div>
                                    <div class="text-sm font-bold" data-i18n="logService">Log Service</div>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (userRole === 'barber') {
                const myTodayTransactions = todayTransactions.filter(t => t.barberId === currentUser.uid);

                        <span class="font-medium">${s.name} ${s.isCustom ? '✨' : ''}</span>
                        <div class="text-right">
                            <span class="text-blue-600 font-bold">$${s.revenue}</span>
                            <span class="text-gray-500 text-sm ml-2">(${s.count}x)</span>
                        </div>
                    </div>
                `;
            });

            if (Object.keys(serviceStats).length === 0) {
                html += `<div class="text-gray-500 text-center py-4" data-i18n="noData">No data available</div>`;
            }

            html += `
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border">
                        <h3 class="font-bold mb-4" data-i18n="dailySales">Daily Sales</h3>
                        <div class="space-y-3 max-h-80 overflow-y-auto">
            `;

            sortedDays.forEach(day => {
                html += `
                    <div class="flex justify-between items-center border-b pb-2">
                        <span class="font-medium">${day}</span>
                        <div class="text-right">
                            <span class="text-blue-600 font-bold">$${dailySales[day].revenue}</span>
                            <span class="text-gray-500 text-sm ml-2">(${dailySales[day].customers} cust)</span>
                        </div>
                    </div>
                `;
            });

            if (sortedDays.length === 0) {
                html += `<div class="text-gray-500 text-center py-4" data-i18n="noData">No data available</div>`;
            }

            html += `
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('reports-content').innerHTML = html;
            refreshUI();
        }

        window.generateReport = () => {
            reportStartDate = document.getElementById('report-start').value;
            reportEndDate = document.getElementById('report-end').value;
            renderReports();
        };

        // ============== USER MANAGEMENT ==============
        function renderUserManagement() {
            let html = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold" data-i18n="userManagement">User Management</h2>
                    <div class="bg-blue-50 p-6 rounded-3xl border">
                        <h3 class="font-bold mb-4" data-i18n="addUser">Add User</h3>
                        <div class="space-y-3">
                            <input type="text" id="new-user-name" placeholder="${i18n[lang].fullName}" class="w-full p-3 border rounded-xl">
                            <input type="email" id="new-user-email" placeholder="${i18n[lang].email}" class="w-full p-3 border rounded-xl">
                            <input type="password" id="new-user-password" placeholder="${i18n[lang].password}" class="w-full p-3 border rounded-xl">
                            <input type="password" id="new-user-confirm" placeholder="${i18n[lang].confirmPassword}" class="w-full p-3 border rounded-xl">
                            <select id="new-user-role" class="w-full p-3 border rounded-xl bg-white">
                                <option value="barber" data-i18n="barber">Barber</option>
                                <option value="cashier" data-i18n="cashier">Cashier</option>
                                <option value="admin" data-i18n="admin">Admin</option>
                            </select>
                            <button onclick="addNewUser()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">
                                ${i18n[lang].addUser}
                            </button>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border">
                        <h3 class="font-bold mb-4" data-i18n="allUsers">All Users</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="p-3 text-left" data-i18n="username">Username</th>
                                        <th class="p-3 text-left" data-i18n="fullName">Full Name</th>
                                        <th class="p-3 text-left" data-i18n="role">Role</th>
                                        <th class="p-3 text-left" data-i18n="createdAt">Created At</th>
                                        <th class="p-3 text-left" data-i18n="actions">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
            `;

            allUsers.forEach(user => {
                const created = user.createdAt?.toDate ? user.createdAt.toDate().toLocaleDateString() : 'N/A';
                html += `
                    <tr class="border-b">
                        <td class="p-3">${user.email?.split('@')[0] || 'N/A'}</td>
                        <td class="p-3">${user.name || '-'}</td>
                        <td class="p-3"><span class="px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-xs">${user.role}</span></td>
                        <td class="p-3">${created}</td>
                        <td class="p-3">
                            <button onclick="deleteUser('${user.uid}')" class="text-red-600 text-sm" data-i18n="delete">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('user-management-content').innerHTML = html;
            refreshUI();
        }

        window.addNewUser = async () => {
            const name = document.getElementById('new-user-name').value;
            const email = document.getElementById('new-user-email').value;
            const password = document.getElementById('new-user-password').value;
            const confirm = document.getElementById('new-user-confirm').value;
            const role = document.getElementById('new-user-role').value;

            if (!name || !email || !password || !confirm) {
                alert(i18n[lang].fillAllFields);
                return;
            }

            if (password !== confirm) {
                alert(i18n[lang].passwordsNoMatch);
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    name: name,
                    email: email,
                    role: role,
                    createdAt: serverTimestamp(),
                    createdBy: currentUser.uid
                });

                alert(i18n[lang].userCreated);
                
                document.getElementById('new-user-name').value = '';
                document.getElementById('new-user-email').value = '';
                document.getElementById('new-user-password').value = '';
                document.getElementById('new-user-confirm').value = '';
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        window.deleteUser = async (userId) => {
            if (!confirm(i18n[lang].confirmDelete)) return;
            try {
                await deleteDoc(doc(db, "users", userId));
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        // ============== SERVICE MANAGEMENT ==============
        function renderServiceManagement() {
            let html = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold" data-i18n="serviceManagement">Service Management</h2>
                    <div class="bg-green-50 p-6 rounded-3xl border">
                        <h3 class="font-bold mb-4" data-i18n="addService">Add Service</h3>
                        <div class="space-y-3">
                            <input type="text" id="new-service-en" placeholder="${i18n[lang].serviceNameEn}" class="w-full p-3 border rounded-xl">
                            <input type="text" id="new-service-ar" placeholder="${i18n[lang].serviceNameAr}" class="w-full p-3 border rounded-xl">
                            <input type="number" id="new-service-price" placeholder="${i18n[lang].price}" class="w-full p-3 border rounded-xl">
                            <input type="text" id="new-service-icon" placeholder="${i18n[lang].icon}" value="✂️" class="w-full p-3 border rounded-xl">
                            <button onclick="addNewService()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">
                                ${i18n[lang].addService}
                            </button>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border">
                        <h3 class="font-bold mb-4" data-i18n="allServices">All Services</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="p-3 text-left" data-i18n="serviceName">Service Name</th>
                                        <th class="p-3 text-left" data-i18n="price">Price</th>
                                        <th class="p-3 text-left" data-i18n="createdAt">Created At</th>
                                        <th class="p-3 text-left" data-i18n="actions">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
            `;

            services.forEach(service => {
                const created = service.createdAt?.toDate ? service.createdAt.toDate().toLocaleDateString() : 'N/A';
                html += `
                    <tr class="border-b">
                        <td class="p-3">${service.icon || '✂️'} ${lang === 'en' ? service.nameEn : service.nameAr}</td>
                        <td class="p-3 font-bold text-blue-600">$${service.price}</td>
                        <td class="p-3">${created}</td>
                        <td class="p-3">
                            <button onclick="deleteService('${service.id}')" class="text-red-600 text-sm" data-i18n="delete">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += `
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('service-management-content').innerHTML = html;
            refreshUI();
        }

        window.addNewService = async () => {
            const nameEn = document.getElementById('new-service-en').value;
            const nameAr = document.getElementById('new-service-ar').value;
            const price = parseFloat(document.getElementById('new-service-price').value);
            const icon = document.getElementById('new-service-icon').value || '✂️';

            if (!nameEn || !nameAr || !price) {
                alert(i18n[lang].fillAllFields);
                return;
            }

            try {
                await addDoc(collection(db, "services"), {
                    nameEn: nameEn,
                    nameAr: nameAr,
                    price: price,
                    icon: icon,
                    createdAt: serverTimestamp()
                });

                alert(i18n[lang].serviceAdded);
                
                document.getElementById('new-service-en').value = '';
                document.getElementById('new-service-ar').value = '';
                document.getElementById('new-service-price').value = '';
                document.getElementById('new-service-icon').value = '✂️';
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        window.deleteService = async (serviceId) => {
            if (!confirm(i18n[lang].confirmDelete)) return;
            try {
                await deleteDoc(doc(db, "services", serviceId));
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        // ============== FACTORY RESET ==============
        window.factoryReset = async () => {
            if (!confirm(i18n[lang].confirmReset)) return;

            try {
                const batch = writeBatch(db);

                const transSnap = await getDocs(collection(db, "transactions"));
                transSnap.docs.forEach(doc => batch.delete(doc.ref));

                const usersSnap = await getDocs(collection(db, "users"));
                usersSnap.docs.forEach(doc => batch.delete(doc.ref));

                const servicesSnap = await getDocs(collection(db, "services"));
                servicesSnap.docs.forEach(doc => batch.delete(doc.ref));

                await batch.commit();
                await signOut(auth);
                alert("Factory reset complete. System will now restart.");
                location.reload();
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        // ============== UTILITIES ==============
        function refreshUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18n[lang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = i18n[lang][key];
                    } else if (el.tagName === 'OPTION') {
                        el.textContent = i18n[lang][key];
                    } else {
                        el.innerText = i18n[lang][key];
                    }
                }
            });
        }

        // Initialize on page load
        window.onload = () => {
            refreshUI();
            checkFirstTimeSetup();
        };
    </script>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="hnb04.jpg" class="h-12 w-12 rounded-full border-2 border-blue-200 shadow-sm" alt="Logo">
            <h1 class="font-bold text-xl text-slate-800" data-i18n="appName">Barber Shop Pro</h1>
        </div>
        <div class="flex gap-3 items-center">
            <button onclick="toggleLang()" class="bg-blue-50 text-blue-600 px-5 py-2 rounded-full text-sm font-bold hover:bg-blue-100 transition">
                العربية / EN
            </button>
            <button id="logout-btn" onclick="doLogout()" class="bg-red-50 text-red-600 px-5 py-2 rounded-full text-sm font-bold hover:bg-red-100 transition hidden" data-i18n="logout">
                Logout
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-6 pb-20">
        <!-- Auth View -->
        <div id="auth-view" class="mt-10">
            <div class="flex justify-center mb-8">
                <img src="hnb04.jpg" class="h-32 w-32 shadow-xl rounded-full border-4 border-white">
            </div>
            
            <!-- Setup Card -->
            <div id="setup-card" class="hidden">
                <div class="bg-white p-8 rounded-[2.5rem] card-shadow border-t-8 border-blue-600 max-w-md mx-auto">
                    <h2 class="text-3xl font-bold mb-2 text-center" data-i18n="setupTitle">Register as First Admin</h2>
                    <p class="text-gray-600 text-center mb-6" data-i18n="setupDesc">No admin exists yet. Register to become the system administrator.</p>
                    
                    <input type="email" id="setup-email" data-i18n="email" placeholder="Email Address" class="w-full mb-4 p-4 border rounded-2xl bg-gray-50">
                    <input type="password" id="setup-password" data-i18n="password" placeholder="Password" class="w-full mb-4 p-4 border rounded-2xl bg-gray-50">
                    <input type="password" id="setup-confirm" data-i18n="confirmPassword" placeholder="Confirm Password" class="w-full mb-8 p-4 border rounded-2xl bg-gray-50">
                    
                    <button onclick="registerFirstAdmin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-lg mb-4" data-i18n="createAdmin">
                        Create Admin Account
                    </button>
                    
                    <div class="text-center">
                        <button onclick="showLogin()" class="text-blue-500 underline text-sm" data-i18n="backToLogin">
                            Back to Login
                        </button>
                    </div>
                </div>
            </div>

            <!-- Login Card -->
            <div id="login-card" class="hidden">
                <div class="bg-white p-8 rounded-[2.5rem] card-shadow border max-w-md mx-auto">
                    <h2 class="text-3xl font-bold mb-8 text-center" data-i18n="login">Login</h2>
                    
                    <input type="email" id="login-email" data-i18n="email" placeholder="Email Address" class="w-full mb-4 p-4 border rounded-2xl bg-gray-50">
                    <input type="password" id="login-password" data-i18n="password" placeholder="Password" class="w-full mb-8 p-4 border rounded-2xl bg-gray-50">
                    
                    <button onclick="doLogin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold text-lg hover:bg-slate-800 transition shadow-lg mb-4" data-i18n="loginButton">
                        Sign In
                    </button>
                    
                    <div class="text-center">
                        <button onclick="showSetup()" class="text-blue-500 underline text-sm" data-i18n="needSetup">
                            First time? Register as Admin
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- App View -->
        <div id="app-view" class="hidden space-y-6">
            <!-- Navigation -->
            <div class="bg-white p-2 rounded-2xl shadow-sm flex gap-2 overflow-x-auto">
                <button onclick="showPanel('dashboard')" class="flex-1 py-3 px-4 rounded-xl font-bold text-blue-600 bg-blue-50 whitespace-nowrap">
                    📊 <span data-i18n="dashboard">Dashboard</span>
                </button>
                <button onclick="showPanel('services')" class="flex-1 py-3 px-4 rounded-xl font-bold text-gray-600 hover:bg-gray-50 whitespace-nowrap">
                    ✂️ <span data-i18n="logService">Log Service</span>
                </button>
                <button onclick="showPanel('activity')" class="flex-1 py-3 px-4 rounded-xl font-bold text-gray-600 hover:bg-gray-50 whitespace-nowrap">
                    📋 <span data-i18n="activityLogs">Activity</span>
                </button>
                <button onclick="showPanel('reports')" class="flex-1 py-3 px-4 rounded-xl font-bold text-gray-600 hover:bg-gray-50 whitespace-nowrap">
                    📊 <span data-i18n="reports">Reports</span>
                </button>
                <button id="admin-tab" onclick="showPanel('users')" class="flex-1 py-3 px-4 rounded-xl font-bold text-gray-600 hover:bg-gray-50 whitespace-nowrap hidden">
                    👥 <span data-i18n="users">Users</span>
                </button>
                <button id="admin-tab2" onclick="showPanel('services-mgmt')" class="flex-1 py-3 px-4 rounded-xl font-bold text-gray-600 hover:bg-gray-50 whitespace-nowrap hidden">
                    ⚙️ <span data-i18n="services">Services</span>
                </button>
                <button id="admin-tab3" onclick="showPanel('reset')" class="flex-1 py-3 px-4 rounded-xl font-bold text-red-600 hover:bg-red-50 whitespace-nowrap hidden">
                    🔄 <span data-i18n="factoryReset">Reset</span>
                </button>
            </div>

            <!-- Panels -->
            <div id="dashboard-panel" class="hidden"><div id="dashboard-content"></div></div>
            <div id="services-panel" class="hidden bg-white p-6 rounded-[2.5rem] card-shadow border"><div id="services-content"></div></div>
            <div id="activity-panel" class="hidden"><div id="activity-content"></div></div>
            <div id="reports-panel" class="hidden"><div id="reports-content"></div></div>
            <div id="user-management-panel" class="hidden"><div id="user-management-content"></div></div>
            <div id="service-management-panel" class="hidden"><div id="service-management-content"></div></div>
            
            <!-- Factory Reset Panel -->
            <div id="factory-reset-panel" class="hidden">
                <div class="bg-white p-8 rounded-[2.5rem] card-shadow border space-y-6">
                    <h2 class="text-3xl font-bold text-red-600" data-i18n="factoryReset">Factory Reset</h2>
                    <p class="text-gray-600" data-i18n="resetSystem">Reset the system to its initial state</p>
                    <div class="bg-red-50 p-6 rounded-3xl border-2 border-red-200">
                        <h3 class="font-bold text-red-700 text-xl mb-2" data-i18n="warning">Warning</h3>
                        <p class="text-red-600" data-i18n="irreversible">This action is irreversible and will permanently delete all data.</p>
                    </div>
                    <button onclick="factoryReset()" class="w-full bg-red-600 text-white p-6 rounded-2xl font-bold text-xl hover:bg-red-700 transition shadow-lg">
                        ⚠️ <span data-i18n="performReset">Perform Factory Reset</span>
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
