<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Barber Shop POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        .font-ar { font-family: 'Cairo', sans-serif; }
        .card-shadow { box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1); }
        .service-btn { transition: all 0.2s; }
        .service-btn:hover { transform: translateY(-2px); }
        .hidden-panel { display: none !important; }
        .active-tab { background-color: #2563eb !important; color: white !important; }
    </style>
    <script type="module">
        // ============== FIREBASE IMPORTS ==============
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, doc, setDoc, getDoc, onSnapshot, writeBatch, deleteDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ============== FIREBASE INIT ==============
        const firebaseConfig = window.FIREBASE_CONFIG;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============== TRANSLATIONS ==============
        const i18n = {
            en: {
                appName: "Barber Shop POS",
                login: "Login",
                logout: "Logout",
                email: "Email Address",
                password: "Password",

                dashboard: "Dashboard",

                reset: "Reset",
                todayRevenue: "Today's Revenue",
                todayCustomers: "Today's Customers",
                todayServices: "Today's Services",
                activeBarbers: "Active Barbers",
                thisWeek: "This Week",

                manageUsers: "Manage Users",
                manageServices: "Manage Services",
                viewReports: "View Reports",
                selectBarber: "Select Barber",
                selectService: "Select Service",

                logServiceBtn: "Log Service",

                customServiceDesc: "Service not in list? Enter custom price",
                customPrice: "Custom Price ($)",
                serviceName: "Service Name (optional)",
                logCustom: "Log Custom Service",

                noData: "No data available",
                serviceLogged: "Service logged successfully!",
                userCreated: "User created successfully!",
                serviceAdded: "Service added successfully!",
                addUser: "Add User",
                addService: "Add Service",
                fullName: "Full Name",
                role: "Role",
                actions: "Actions",
                delete: "Delete",
                warning: "Warning",
                performReset: "Factory Reset",
                confirmReset: "Are you sure? This cannot be undone!",
                barber: "Barber",
                cashier: "Cashier",
                admin: "Admin",
                date: "Date",
                time: "Time",
                price: "Price",
                customers: "Cust",
                filter: "Filter",
                resetFilter: "Reset",

                allBarbers: "All Barbers",
                totalRevenue: "Total Revenue",

                unauthorized: "You don't have permission to view this"
            },
            ar: {
                appName: "نظام الحلاقة",
                login: "تسجيل الدخول",
                logout: "تسجيل الخروج",
                email: "البريد الإلكتروني",
                password: "كلمة المرور",
                confirmPassword: "تأكيد كلمة المرور",
                createAdmin: "إنشاء حساب المدير",
                signIn: "دخول",
                firstTime: "أول مرة؟ سجل كمدير",
                backToLogin: "العودة لتسجيل الدخول",
                fillAllFields: "يرجى ملء جميع الحقول",
                passwordsNoMatch: "كلمات المرور غير متطابقة",
                dashboard: "الرئيسية",
                logService: "تسجيل خدمة",
                myActivity: "نشاطي",
                allActivity: "كل النشاطات",
                reports: "التقارير",
                users: "المستخدمين",
                services: "الخدمات",
                reset: "إعادة ضبط",
                todayRevenue: "إيرادات اليوم",
                todayCustomers: "عملاء اليوم",
                todayServices: "خدمات اليوم",
                activeBarbers: "الحلاقين النشطين",
                thisWeek: "هذا الأسبوع",
                quickActions: "إجراءات سريعة",
                manageUsers: "إدارة المستخدمين",
                manageServices: "إدارة الخدمات",
                viewReports: "عرض التقارير",
                selectBarber: "اختر الحلاق",
                selectService: "اختر الخدمة",
                numberOfCustomers: "عدد العملاء",
                logServiceBtn: "تسجيل",
                customService: "خدمة مخصصة",
                customServiceDesc: "الخدمة غير موجودة؟ أدخل السعر",
                customPrice: "السعر ($)",
                serviceName: "اسم الخدمة (اختياري)",
                logCustom: "تسجيل خدمة مخصصة",
                recentLogs: "آخر التسجيلات",
                noData: "لا توجد بيانات",
                serviceLogged: "تم التسجيل بنجاح!",
                userCreated: "تم إنشاء المستخدم!",
                serviceAdded: "تمت إضافة الخدمة!",
                addUser: "إضافة مستخدم",
                addService: "إضافة خدمة",
                fullName: "الاسم الكامل",
                role: "الدور",
                actions: "إجراءات",
                delete: "حذف",
                warning: "تحذير",
                performReset: "إعادة ضبط المصنع",
                confirmReset: "هل أنت متأكد؟ لا يمكن التراجع!",
                barber: "حلاق",
                cashier: "كاشير",
                admin: "مدير",
                date: "التاريخ",
                time: "الوقت",
                price: "السعر",
                customers: "عملاء",
                filter: "تصفية",
                resetFilter: "إعادة ضبط",
                startDate: "من تاريخ",
                endDate: "إلى تاريخ",
                allBarbers: "كل الحلاقين",
                totalRevenue: "الإجمالي",
                total: "المجموع",
                exportCSV: "تصدير",
                unauthorized: "ليس لديك صلاحية"
            }
        };

        // ============== GLOBAL STATE ==============
        let lang = localStorage.getItem('lang') || 'en';
        let currentUser = null;
        let userRole = null;
        let userData = null;
        let allUsers = [];
        let barbers = [];
        let services = [];
        let transactions = [];
        let currentPanel = 'dashboard';
        
        // Dates
        let today = new Date().toISOString().split('T')[0];
        let weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
        
        // Filters
        let activityStartDate = weekAgo;
        let activityEndDate = today;
        let activityBarberFilter = 'all';
        let reportStartDate = weekAgo;
        let reportEndDate = today;
        let reportBarberFilter = 'all';

        // ============== INIT ==============
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.body.className = lang === 'ar' ? 'font-ar bg-gray-100' : 'bg-gray-100';

        // ============== LANGUAGE ==============
        window.toggleLang = () => {
            lang = lang === 'en' ? 'ar' : 'en';
            localStorage.setItem('lang', lang);
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.body.className = lang === 'ar' ? 'font-ar bg-gray-100' : 'bg-gray-100';
            refreshUI();
            if (currentUser) refreshCurrentPanel();
        };

        // ============== CHECK FIRST SETUP ==============
        async function checkFirstSetup() {
            const snap = await getDocs(collection(db, "users"));
            if (snap.empty) {
                document.getElementById('setup-card').classList.remove('hidden');
                document.getElementById('login-card').classList.add('hidden');
            } else {
                document.getElementById('setup-card').classList.add('hidden');
                document.getElementById('login-card').classList.remove('hidden');
            }
        }

        // ============== AUTH STATE ==============
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    userRole = userData.role;
                    currentUser = user;
                    
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('app-view').classList.remove('hidden');
                    document.getElementById('logout-btn').classList.remove('hidden');
                    
                    startListeners();
                    showPanel('dashboard');
                } else {
                    await signOut(auth);
                    checkFirstSetup();
                }
            } else {
                currentUser = null;
                userRole = null;
                userData = null;
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
                document.getElementById('logout-btn').classList.add('hidden');
                checkFirstSetup();
            }
        });

        // ============== FIREBASE LISTENERS ==============
        function startListeners() {
            // Services
            onSnapshot(collection(db, "services"), (snap) => {
                services = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentPanel === 'services' || currentPanel === 'services-mgmt') refreshCurrentPanel();
            });

            // Users - Role based
            if (userRole === 'admin') {
                onSnapshot(collection(db, "users"), (snap) => {
                    allUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
                    barbers = allUsers.filter(u => u.role === 'barber');
                    if (currentPanel === 'users') refreshCurrentPanel();
                });
            } else {
                onSnapshot(query(collection(db, "users"), where("role", "==", "barber")), (snap) => {
                    barbers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
                });
            }

            // Transactions - Role based
            let q;
            if (userRole === 'admin' || userRole === 'cashier') {
                q = query(collection(db, "transactions"), orderBy("timestamp", "desc"));
            } else {
                q = query(collection(db, "transactions"), where("barberId", "==", currentUser.uid), orderBy("timestamp", "desc"));
            }
            
            onSnapshot(q, (snap) => {
                transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (currentPanel === 'dashboard' || currentPanel === 'activity' || currentPanel === 'reports') {
                    refreshCurrentPanel();
                }
            });
        }

        // ============== NAVIGATION ==============
        window.showPanel = (panel) => {
            currentPanel = panel;
            
            // Hide all panels
            document.getElementById('dashboard-panel').classList.add('hidden');
            document.getElementById('service-log-panel').classList.add('hidden');
            document.getElementById('activity-panel').classList.add('hidden');
            document.getElementById('reports-panel').classList.add('hidden');
            document.getElementById('users-panel').classList.add('hidden');
            document.getElementById('services-panel').classList.add('hidden');
            document.getElementById('reset-panel').classList.add('hidden');

            // Remove active class from all tabs
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.remove('bg-blue-600', 'text-white');
                t.classList.add('text-gray-700', 'hover:bg-gray-200');
            });

            // Show selected panel
            if (panel === 'dashboard') {
                document.getElementById('dashboard-panel').classList.remove('hidden');
                document.getElementById('tab-dashboard').classList.add('bg-blue-600', 'text-white');
                renderDashboard();
            } else if (panel === 'log') {
                document.getElementById('service-log-panel').classList.remove('hidden');
                document.getElementById('tab-log').classList.add('bg-blue-600', 'text-white');
                renderServiceLog();
            } else if (panel === 'activity') {
                document.getElementById('activity-panel').classList.remove('hidden');
                document.getElementById('tab-activity').classList.add('bg-blue-600', 'text-white');
                renderActivity();
            } else if (panel === 'reports') {
                if (userRole === 'admin' || userRole === 'cashier') {
                    document.getElementById('reports-panel').classList.remove('hidden');
                    document.getElementById('tab-reports').classList.add('bg-blue-600', 'text-white');
                    renderReports();
                } else {
                    alert(i18n[lang].unauthorized);
                    showPanel('dashboard');
                }
            } else if (panel === 'users') {
                if (userRole === 'admin') {
                    document.getElementById('users-panel').classList.remove('hidden');
                    document.getElementById('tab-users').classList.add('bg-blue-600', 'text-white');
                    renderUsers();
                } else {
                    alert(i18n[lang].unauthorized);
                    showPanel('dashboard');
                }
            } else if (panel === 'services') {
                if (userRole === 'admin') {
                    document.getElementById('services-panel').classList.remove('hidden');
                    document.getElementById('tab-services').classList.add('bg-blue-600', 'text-white');
                    renderServicesMgmt();
                } else {
                    alert(i18n[lang].unauthorized);
                    showPanel('dashboard');
                }
            } else if (panel === 'reset') {
                if (userRole === 'admin') {
                    document.getElementById('reset-panel').classList.remove('hidden');
                    document.getElementById('tab-reset').classList.add('bg-blue-600', 'text-white');
                } else {
                    alert(i18n[lang].unauthorized);
                    showPanel('dashboard');
                }
            }
        };

        function refreshCurrentPanel() {
            if (currentPanel === 'dashboard') renderDashboard();
            else if (currentPanel === 'log') renderServiceLog();
            else if (currentPanel === 'activity') renderActivity();
            else if (currentPanel === 'reports') renderReports();
            else if (currentPanel === 'users') renderUsers();
            else if (currentPanel === 'services') renderServicesMgmt();
        }

        // ============== AUTH FUNCTIONS ==============
        window.registerFirstAdmin = async () => {
            const email = document.getElementById('setup-email').value;
            const pass = document.getElementById('setup-password').value;
            const conf = document.getElementById('setup-confirm').value;

            if (!email || !pass || !conf) return alert(i18n[lang].fillAllFields);
            if (pass !== conf) return alert(i18n[lang].passwordsNoMatch);

            try {
                const snap = await getDocs(collection(db, "users"));
                if (!snap.empty) return alert("Admin already exists");

                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), {
                    email, name: email.split('@')[0], role: 'admin', createdAt: serverTimestamp()
                });

                const defaultServices = [
                    { nameEn: "Haircut", nameAr: "حلاقة شعر", price: 120 },
                    { nameEn: "Beard Trim", nameAr: "حلاقة دقن", price: 50 },
                    { nameEn: "Kids Cut", nameAr: "حلاقة أطفال", price: 100 },
                    { nameEn: "Hair Coloring", nameAr: "صبغ شعر", price: 200 }
                ];

                const batch = writeBatch(db);
                defaultServices.forEach(s => batch.set(doc(collection(db, "services")), s));
                await batch.commit();
                
                alert("Admin created! You can now login.");
            } catch (error) {
                alert(error.message);
            }
        };

        window.doLogin = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            if (!email || !pass) return alert(i18n[lang].fillAllFields);
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert(error.message);
            }
        };

        window.doLogout = () => signOut(auth);
        window.showSetup = () => {
            document.getElementById('setup-card').classList.remove('hidden');
            document.getElementById('login-card').classList.add('hidden');
        };
        window.showLogin = () => {
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('login-card').classList.remove('hidden');
        };

        // ============== DASHBOARD ==============
        function renderDashboard() {
            const todayStr = new Date().toISOString().split('T')[0];
            let todayTx = [];
            
            if (userRole === 'barber') {
                todayTx = transactions.filter(t => t.date === todayStr && t.barberId === currentUser.uid);
            } else {
                todayTx = transactions.filter(t => t.date === todayStr);
            }

            const revenue = todayTx.reduce((s, t) => s + (t.price || 0), 0);
            const customers = todayTx.reduce((s, t) => s + (t.customers || 1), 0);
            const servicesCount = todayTx.length;
            const activeBarbers = new Set(todayTx.map(t => t.barberId)).size;

            const weekTx = transactions.filter(t => t.date >= weekAgo);
            const weekRevenue = weekTx.reduce((s, t) => s + (t.price || 0), 0);

            let html = '';

            if (userRole === 'admin') {
                html = `
                    <div class="space-y-6">
                        <h2 class="text-2xl font-bold text-gray-800">Admin Dashboard</h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-blue-600">$${revenue}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayRevenue}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-green-600">${customers}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayCustomers}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-purple-600">${servicesCount}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayServices}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-orange-600">${activeBarbers}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].activeBarbers}</div>
                            </div>
                        </div>
                        <div class="bg-blue-50 p-6 rounded-2xl">
                            <div class="text-xl font-bold">${i18n[lang].thisWeek}: $${weekRevenue}</div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <button onclick="showPanel('users')" class="p-4 bg-white rounded-2xl shadow text-center hover:bg-gray-50">
                                <div class="text-2xl">👥</div>
                                <div class="text-sm font-bold">${i18n[lang].manageUsers}</div>
                            </button>
                            <button onclick="showPanel('services')" class="p-4 bg-white rounded-2xl shadow text-center hover:bg-gray-50">
                                <div class="text-2xl">✂️</div>
                                <div class="text-sm font-bold">${i18n[lang].manageServices}</div>
                            </button>
                            <button onclick="showPanel('reports')" class="p-4 bg-white rounded-2xl shadow text-center hover:bg-gray-50">
                                <div class="text-2xl">📊</div>
                                <div class="text-sm font-bold">${i18n[lang].reports}</div>
                            </button>
                            <button onclick="showPanel('log')" class="p-4 bg-white rounded-2xl shadow text-center hover:bg-gray-50">
                                <div class="text-2xl">📝</div>
                                <div class="text-sm font-bold">${i18n[lang].logService}</div>
                            </button>
                        </div>
                    </div>
                `;
            } else if (userRole === 'barber') {
                html = `
                    <div class="space-y-6">
                        <h2 class="text-2xl font-bold text-gray-800">${i18n[lang].dashboard}</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-blue-600">$${revenue}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayRevenue}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-green-600">${customers}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayCustomers}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-purple-600">${servicesCount}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayServices}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-orange-600">$${weekRevenue}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].thisWeek}</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="showPanel('log')" class="p-6 bg-blue-50 rounded-2xl text-center">
                                <div class="text-3xl">✂️</div>
                                <div class="font-bold">${i18n[lang].logService}</div>
                            </button>
                            <button onclick="showPanel('activity')" class="p-6 bg-green-50 rounded-2xl text-center">
                                <div class="text-3xl">📋</div>
                                <div class="font-bold">${i18n[lang].myActivity}</div>
                            </button>
                        </div>
                    </div>
                `;
            } else if (userRole === 'cashier') {
                html = `
                    <div class="space-y-6">
                        <h2 class="text-2xl font-bold text-gray-800">Cashier Dashboard</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-blue-600">$${revenue}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayRevenue}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-green-600">${customers}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayCustomers}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-purple-600">${servicesCount}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].todayServices}</div>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow">
                                <div class="text-3xl font-bold text-orange-600">$${weekRevenue}</div>
                                <div class="text-sm text-gray-600">${i18n[lang].thisWeek}</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="showPanel('log')" class="p-4 bg-blue-50 rounded-2xl text-center">
                                <div class="text-2xl">✂️</div>
                                <div class="text-sm font-bold">${i18n[lang].logService}</div>
                            </button>
                            <button onclick="showPanel('activity')" class="p-4 bg-green-50 rounded-2xl text-center">
                                <div class="text-2xl">📋</div>
                                <div class="text-sm font-bold">${i18n[lang].allActivity}</div>
                            </button>
                            <button onclick="showPanel('reports')" class="p-4 bg-purple-50 rounded-2xl text-center">
                                <div class="text-2xl">📊</div>
                                <div class="text-sm font-bold">${i18n[lang].reports}</div>
                            </button>
                        </div>
                    </div>
                `;
            }

            document.getElementById('dashboard-content').innerHTML = html;
            refreshUI();
        }

        // ============== SERVICE LOGGING ==============
        function renderServiceLog() {
            let html = '';

            // Barber selector for cashier/admin
            if (userRole === 'cashier' || userRole === 'admin') {
                html += `
                    <div class="mb-4">
                        <select id="log-barber" class="w-full p-4 border rounded-2xl bg-white">
                            <option value="">${i18n[lang].selectBarber}</option>
                            ${barbers.map(b => `<option value="${b.uid}">${b.name || b.email}</option>`).join('')}
                        </select>
                    </div>
                `;
            }

            // Customer count
            html += `
                <div class="mb-4">
                    <input type="number" id="log-customers" min="1" value="1" class="w-full p-4 border rounded-2xl" placeholder="${i18n[lang].numberOfCustomers}">
                </div>
            `;

            // Custom service card
            html += `
                <div class="mb-6 p-6 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-300 text-center">
                    <div class="text-4xl mb-2">✨</div>
                    <h3 class="text-xl font-bold mb-2">${i18n[lang].customService}</h3>
                    <p class="text-gray-600 mb-4">${i18n[lang].customServiceDesc}</p>
                    <button onclick="showCustomModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700">
                        ${i18n[lang].logCustom}
                    </button>
                </div>
            `;

            // Regular services
            html += `<h3 class="font-bold text-xl mb-4">${i18n[lang].services}</h3>`;
            html += `<div class="grid grid-cols-2 md:grid-cols-3 gap-4">`;

            services.forEach(s => {
                html += `
                    <button onclick="logService('${s.id}')" class="service-btn bg-white p-4 rounded-2xl shadow text-center hover:shadow-md">
                        <div class="text-3xl mb-1">${s.icon || '✂️'}</div>
                        <div class="font-bold text-sm">${lang === 'en' ? s.nameEn : s.nameAr}</div>
                        <div class="text-blue-600 font-bold mt-1">$${s.price}</div>
                    </button>
                `;
            });

            html += `</div>`;

            // Recent logs
            html += `<div class="mt-8"><h3 class="font-bold text-xl mb-4">${i18n[lang].recentLogs}</h3><div class="space-y-2">`;

            let recent = userRole === 'barber' 
                ? transactions.filter(t => t.barberId === currentUser.uid).slice(0, 10)
                : transactions.slice(0, 10);

            recent.forEach(t => {
                const name = t.isCustom ? (t.customName || 'Custom') : (lang === 'en' ? t.serviceNameEn : t.serviceNameAr);
                const date = t.timestamp?.toDate ? t.timestamp.toDate().toLocaleString() : '';
                html += `
                    <div class="bg-white p-3 rounded-xl shadow-sm flex justify-between">
                        <div><span class="font-bold">${name}</span> <span class="text-gray-500 text-sm">${t.barberName}</span></div>
                        <div><span class="text-blue-600 font-bold">$${t.price}</span> <span class="text-gray-400 text-xs">${date}</span></div>
                    </div>
                `;
            });

            html += `</div></div>`;
            document.getElementById('log-content').innerHTML = html;
        }

        window.logService = async (serviceId) => {
            const service = services.find(s => s.id === serviceId);
            if (!service) return;

            let barberId;
            if (userRole === 'barber') {
                barberId = currentUser.uid;
            } else {
                const sel = document.getElementById('log-barber');
                if (!sel || !sel.value) return alert(i18n[lang].selectBarber);
                barberId = sel.value;
            }

            const customers = parseInt(document.getElementById('log-customers').value) || 1;
            const barber = barbers.find(b => b.uid === barberId);

            await addDoc(collection(db, "transactions"), {
                barberId, barberName: barber?.name || barber?.email,
                serviceId: service.id,
                serviceNameEn: service.nameEn,
                serviceNameAr: service.nameAr,
                price: service.price,
                customers,
                timestamp: serverTimestamp(),
                date: new Date().toISOString().split('T')[0],
                loggedBy: currentUser.uid
            });

            alert(i18n[lang].serviceLogged);
        };

        window.showCustomModal = () => {
            const modal = document.createElement('div');
            modal.id = 'custom-modal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50';
            
            modal.innerHTML = `
                <div class="bg-white rounded-2xl max-w-md w-full p-6">
                    <h3 class="text-2xl font-bold mb-4">${i18n[lang].customService}</h3>
                    
                    ${(userRole === 'cashier' || userRole === 'admin') ? `
                        <select id="modal-barber" class="w-full p-3 border rounded-xl mb-3">
                            <option value="">${i18n[lang].selectBarber}</option>
                            ${barbers.map(b => `<option value="${b.uid}">${b.name || b.email}</option>`).join('')}
                        </select>
                    ` : ''}
                    
                    <input type="text" id="modal-name" placeholder="${i18n[lang].serviceName}" class="w-full p-3 border rounded-xl mb-3">
                    <input type="number" id="modal-price" placeholder="${i18n[lang].customPrice}" class="w-full p-3 border rounded-xl mb-3">
                    <input type="number" id="modal-customers" min="1" value="1" class="w-full p-3 border rounded-xl mb-4">
                    
                    <div class="flex gap-3">
                        <button onclick="logCustomService()" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold">${i18n[lang].logCustom}</button>
                        <button onclick="closeCustomModal()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">${i18n[lang].cancel}</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        };

        window.closeCustomModal = () => {
            const m = document.getElementById('custom-modal');
            if (m) m.remove();
        };

        window.logCustomService = async () => {
            let barberId;
            if (userRole === 'barber') {
                barberId = currentUser.uid;
            } else {
                const sel = document.getElementById('modal-barber');
                if (!sel || !sel.value) return alert(i18n[lang].selectBarber);
                barberId = sel.value;
            }

            const name = document.getElementById('modal-name').value || (lang === 'en' ? 'Custom' : 'مخصص');
            const price = parseFloat(document.getElementById('modal-price').value);
            const customers = parseInt(document.getElementById('modal-customers').value) || 1;

            if (!price || price <= 0) return alert(i18n[lang].fillAllFields);

            const barber = barbers.find(b => b.uid === barberId);

            await addDoc(collection(db, "transactions"), {
                barberId, barberName: barber?.name || barber?.email,
                serviceId: 'custom',
                serviceNameEn: 'Custom Service',
                serviceNameAr: 'خدمة مخصصة',
                customName: name,
                price, customers,
                isCustom: true,
                timestamp: serverTimestamp(),
                date: new Date().toISOString().split('T')[0],
                loggedBy: currentUser.uid
            });

            closeCustomModal();
            alert(i18n[lang].serviceLogged);
        };

        // ============== ACTIVITY ==============
        function renderActivity() {
            let filtered = [...transactions];
            
            if (userRole === 'barber') {
                filtered = filtered.filter(t => t.barberId === currentUser.uid);
            } else {
                if (activityBarberFilter !== 'all') {
                    filtered = filtered.filter(t => t.barberId === activityBarberFilter);
                }
            }
            
            filtered = filtered.filter(t => t.date >= activityStartDate && t.date <= activityEndDate);

            let html = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold">${userRole === 'barber' ? i18n[lang].myActivity : i18n[lang].allActivity}</h2>
                    
                    <div class="bg-white p-4 rounded-2xl shadow">
                        <div class="grid grid-cols-2 gap-3 mb-3">
            `;

            if (userRole !== 'barber') {
                html += `
                    <div class="col-span-2">
                        <select id="activity-barber" class="w-full p-3 border rounded-xl">
                            <option value="all">${i18n[lang].allBarbers}</option>
                            ${barbers.map(b => `<option value="${b.uid}" ${activityBarberFilter === b.uid ? 'selected' : ''}>${b.name || b.email}</option>`).join('')}
                        </select>
                    </div>
                `;
            }

            html += `
                    <div>
                        <input type="date" id="activity-start" value="${activityStartDate}" class="w-full p-3 border rounded-xl">
                    </div>
                    <div>
                        <input type="date" id="activity-end" value="${activityEndDate}" class="w-full p-3 border rounded-xl">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="applyActivityFilter()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold">${i18n[lang].filter}</button>
                    <button onclick="resetActivityFilter()" class="flex-1 bg-gray-200 p-3 rounded-xl font-bold">${i18n[lang].resetFilter}</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow">
                <div class="flex justify-between mb-4">
                    <h3 class="font-bold">${i18n[lang].total}: $${filtered.reduce((s,t)=>s+(t.price||0),0)}</h3>
                    <span>${filtered.length} ${i18n[lang].services}</span>
                </div>
                <div class="space-y-2 max-h-96 overflow-y-auto">
            `;

            filtered.slice(0, 50).forEach(t => {
                const name = t.isCustom ? (t.customName || 'Custom') : (lang === 'en' ? t.serviceNameEn : t.serviceNameAr);
                const date = t.timestamp?.toDate ? t.timestamp.toDate().toLocaleString() : t.date;
                html += `
                    <div class="border-b pb-2 flex justify-between items-center">
                        <div>
                            <div class="font-bold">${name} ${t.isCustom ? '✨' : ''}</div>
                            <div class="text-sm text-gray-500">${t.barberName} • ${date}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-blue-600 font-bold">$${t.price}</div>
                            <div class="text-xs text-gray-400">${t.customers || 1} ${i18n[lang].customers}</div>
                        </div>
                    </div>
                `;
            });

            if (filtered.length === 0) {
                html += `<div class="text-center text-gray-500 py-8">${i18n[lang].noData}</div>`;
            }

            html += `</div></div></div>`;
            document.getElementById('activity-content').innerHTML = html;
        }

        window.applyActivityFilter = () => {
            if (userRole !== 'barber') {
                activityBarberFilter = document.getElementById('activity-barber').value;
            }
            activityStartDate = document.getElementById('activity-start').value;
            activityEndDate = document.getElementById('activity-end').value;
            renderActivity();
        };

        window.resetActivityFilter = () => {
            activityBarberFilter = 'all';
            activityStartDate = weekAgo;
            activityEndDate = today;
            renderActivity();
        };

        // ============== REPORTS ==============
        function renderReports() {
            let filtered = transactions.filter(t => t.date >= reportStartDate && t.date <= reportEndDate);
            
            if (reportBarberFilter !== 'all') {
                filtered = filtered.filter(t => t.barberId === reportBarberFilter);
            }

            const totalRev = filtered.reduce((s,t)=>s+(t.price||0),0);
            const totalCust = filtered.reduce((s,t)=>s+(t.customers||1),0);
            const totalServ = filtered.length;

            // Barber stats
            const barberStats = {};
            filtered.forEach(t => {
                if (!barberStats[t.barberId]) {
                    barberStats[t.barberId] = { name: t.barberName, revenue: 0, count: 0, cust: 0 };
                }
                barberStats[t.barberId].revenue += t.price || 0;
                barberStats[t.barberId].count++;
                barberStats[t.barberId].cust += t.customers || 1;
            });

            // Service stats
            const serviceStats = {};
            filtered.forEach(t => {
                const key = t.isCustom ? 'custom' : (t.serviceId || 'other');
                if (!serviceStats[key]) {
                    serviceStats[key] = {
                        name: t.isCustom ? (t.customName || 'Custom') : (lang === 'en' ? t.serviceNameEn : t.serviceNameAr),
                        count: 0, revenue: 0
                    };
                }
                serviceStats[key].count++;
                serviceStats[key].revenue += t.price || 0;
            });

            // Daily stats
            const daily = {};
            filtered.forEach(t => {
                if (!daily[t.date]) daily[t.date] = { revenue: 0, count: 0 };
                daily[t.date].revenue += t.price || 0;
                daily[t.date].count++;
            });

            const sortedDays = Object.keys(daily).sort().reverse();

            let html = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold">${i18n[lang].reports}</h2>
                    
                    <div class="bg-white p-4 rounded-2xl shadow">
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            ${userRole !== 'barber' ? `
                                <div class="col-span-2">
                                    <select id="report-barber" class="w-full p-3 border rounded-xl">
                                        <option value="all">${i18n[lang].allBarbers}</option>
                                        ${barbers.map(b => `<option value="${b.uid}">${b.name || b.email}</option>`).join('')}
                                    </select>
                                </div>
                            ` : ''}
                            <div>
                                <input type="date" id="report-start" value="${reportStartDate}" class="w-full p-3 border rounded-xl">
                            </div>
                            <div>
                                <input type="date" id="report-end" value="${reportEndDate}" class="w-full p-3 border rounded-xl">
                            </div>
                        </div>
                        <button onclick="applyReportFilter()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">${i18n[lang].filter}</button>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-white p-4 rounded-2xl shadow text-center">
                            <div class="text-2xl font-bold text-blue-600">$${totalRev}</div>
                            <div class="text-sm">${i18n[lang].totalRevenue}</div>
                        </div>
                        <div class="bg-white p-4 rounded-2xl shadow text-center">
                            <div class="text-2xl font-bold text-green-600">${totalCust}</div>
                            <div class="text-sm">${i18n[lang].customers}</div>
                        </div>
                        <div class="bg-white p-4 rounded-2xl shadow text-center">
                            <div class="text-2xl font-bold text-purple-600">${totalServ}</div>
                            <div class="text-sm">${i18n[lang].services}</div>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-2xl shadow">
                        <h3 class="font-bold mb-3">${i18n[lang].barber}</h3>
                        ${Object.values(barberStats).map(b => `
                            <div class="flex justify-between border-b py-2">
                                <span>${b.name}</span>
                                <span class="font-bold text-blue-600">$${b.revenue} (${b.count})</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="bg-white p-4 rounded-2xl shadow">
                        <h3 class="font-bold mb-3">${i18n[lang].services}</h3>
                        ${Object.values(serviceStats).map(s => `
                            <div class="flex justify-between border-b py-2">
                                <span>${s.name}</span>
                                <span class="font-bold text-blue-600">$${s.revenue} (${s.count}x)</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="bg-white p-4 rounded-2xl shadow">
                        <h3 class="font-bold mb-3">${i18n[lang].date}</h3>
                        ${sortedDays.map(d => `
                            <div class="flex justify-between border-b py-2">
                                <span>${d}</span>
                                <span class="font-bold text-blue-600">$${daily[d].revenue} (${daily[d].count})</span>
                            </div>
                        `).join('')}
                    </div>

                    <button onclick="exportReports()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">${i18n[lang].exportCSV}</button>
                </div>
            `;

            document.getElementById('reports-content').innerHTML = html;
        }

        window.applyReportFilter = () => {
            if (userRole !== 'barber') {
                reportBarberFilter = document.getElementById('report-barber').value;
            }
            reportStartDate = document.getElementById('report-start').value;
            reportEndDate = document.getElementById('report-end').value;
            renderReports();
        };

        window.exportReports = () => {
            let filtered = transactions.filter(t => t.date >= reportStartDate && t.date <= reportEndDate);
            let csv = "Date,Barber,Service,Price,Customers\n";
            filtered.forEach(t => {
                const name = t.isCustom ? (t.customName || 'Custom') : (t.serviceNameEn);
                csv += `${t.date},${t.barberName},${name},${t.price},${t.customers || 1}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report-${reportStartDate}-to-${reportEndDate}.csv`;
            a.click();
        };

        // ============== USER MANAGEMENT (ADMIN ONLY) ==============
        function renderUsers() {
            let html = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold">${i18n[lang].users}</h2>
                    
                    <div class="bg-blue-50 p-6 rounded-2xl">
                        <h3 class="font-bold text-lg mb-4">${i18n[lang].addUser}</h3>
                        <div class="space-y-3">
                            <input type="text" id="new-name" placeholder="${i18n[lang].fullName}" class="w-full p-3 border rounded-xl">
                            <input type="email" id="new-email" placeholder="${i18n[lang].email}" class="w-full p-3 border rounded-xl">
                            <input type="password" id="new-pass" placeholder="${i18n[lang].password}" class="w-full p-3 border rounded-xl">
                            <input type="password" id="new-confirm" placeholder="${i18n[lang].confirmPassword}" class="w-full p-3 border rounded-xl">
                            <select id="new-role" class="w-full p-3 border rounded-xl">
                                <option value="barber">${i18n[lang].barber}</option>
                                <option value="cashier">${i18n[lang].cashier}</option>
                                <option value="admin">${i18n[lang].admin}</option>
                            </select>
                            <button onclick="addNewUser()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">${i18n[lang].addUser}</button>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow">
                        <h3 class="font-bold text-lg mb-4">${i18n[lang].users} (${allUsers.length})</h3>
                        <div class="space-y-2">
            `;

            allUsers.forEach(u => {
                html += `
                    <div class="flex justify-between items-center border-b py-2">
                        <div>
                            <div class="font-bold">${u.name || u.email}</div>
                            <div class="text-sm text-gray-500">${u.email} • ${u.role}</div>
                        </div>
                        <button onclick="deleteUser('${u.uid}')" class="text-red-600 text-sm">${i18n[lang].delete}</button>
                    </div>
                `;
            });

            html += `</div></div></div>`;
            document.getElementById('users-content').innerHTML = html;
        }

        window.addNewUser = async () => {
            const name = document.getElementById('new-name').value;
            const email = document.getElementById('new-email').value;
            const pass = document.getElementById('new-pass').value;
            const conf = document.getElementById('new-confirm').value;
            const role = document.getElementById('new-role').value;

            if (!name || !email || !pass || !conf) return alert(i18n[lang].fillAllFields);
            if (pass !== conf) return alert(i18n[lang].passwordsNoMatch);

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), {
                    name, email, role, createdAt: serverTimestamp(), createdBy: currentUser.uid
                });
                alert(i18n[lang].userCreated);
                document.getElementById('new-name').value = '';
                document.getElementById('new-email').value = '';
                document.getElementById('new-pass').value = '';
                document.getElementById('new-confirm').value = '';
            } catch (error) {
                alert(error.message);
            }
        };

        window.deleteUser = async (uid) => {
            if (!confirm(i18n[lang].confirmDelete)) return;
            try {
                await deleteDoc(doc(db, "users", uid));
            } catch (error) {
                alert(error.message);
            }
        };

        // ============== SERVICE MANAGEMENT (ADMIN ONLY) ==============
        function renderServicesMgmt() {
            let html = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold">${i18n[lang].services}</h2>
                    
                    <div class="bg-green-50 p-6 rounded-2xl">
                        <h3 class="font-bold text-lg mb-4">${i18n[lang].addService}</h3>
                        <div class="space-y-3">
                            <input type="text" id="service-en" placeholder="English Name" class="w-full p-3 border rounded-xl">
                            <input type="text" id="service-ar" placeholder="Arabic Name" class="w-full p-3 border rounded-xl">
                            <input type="number" id="service-price" placeholder="${i18n[lang].price}" class="w-full p-3 border rounded-xl">
                            <input type="text" id="service-icon" placeholder="Icon" value="✂️" class="w-full p-3 border rounded-xl">
                            <button onclick="addNewService()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">${i18n[lang].addService}</button>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow">
                        <h3 class="font-bold text-lg mb-4">${i18n[lang].services} (${services.length})</h3>
                        <div class="space-y-2">
            `;

            services.forEach(s => {
                html += `
                    <div class="flex justify-between items-center border-b py-2">
                        <div>
                            <div class="font-bold">${s.icon || '✂️'} ${lang === 'en' ? s.nameEn : s.nameAr}</div>
                            <div class="text-sm text-gray-500">$${s.price}</div>
                        </div>
                        <button onclick="deleteService('${s.id}')" class="text-red-600 text-sm">${i18n[lang].delete}</button>
                    </div>
                `;
            });

            html += `</div></div></div>`;
            document.getElementById('services-content').innerHTML = html;
        }

        window.addNewService = async () => {
            const en = document.getElementById('service-en').value;
            const ar = document.getElementById('service-ar').value;
            const price = parseFloat(document.getElementById('service-price').value);
            const icon = document.getElementById('service-icon').value || '✂️';

            if (!en || !ar || !price) return alert(i18n[lang].fillAllFields);

            await addDoc(collection(db, "services"), {
                nameEn: en, nameAr: ar, price, icon, createdAt: serverTimestamp()
            });

            alert(i18n[lang].serviceAdded);
            document.getElementById('service-en').value = '';
            document.getElementById('service-ar').value = '';
            document.getElementById('service-price').value = '';
            document.getElementById('service-icon').value = '✂️';
        };

        window.deleteService = async (id) => {
            if (!confirm(i18n[lang].confirmDelete)) return;
            await deleteDoc(doc(db, "services", id));
        };

        // ============== FACTORY RESET ==============
        window.factoryReset = async () => {
            if (!confirm(i18n[lang].confirmReset)) return;
            
            const batch = writeBatch(db);
            
            const txSnap = await getDocs(collection(db, "transactions"));
            txSnap.docs.forEach(d => batch.delete(d.ref));
            
            const userSnap = await getDocs(collection(db, "users"));
            userSnap.docs.forEach(d => batch.delete(d.ref));
            
            const svcSnap = await getDocs(collection(db, "services"));
            svcSnap.docs.forEach(d => batch.delete(d.ref));
            
            await batch.commit();
            await signOut(auth);
            location.reload();
        };

        // ============== UI HELPERS ==============
        function refreshUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (i18n[lang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = i18n[lang][key];
                    } else {
                        el.innerText = i18n[lang][key];
                    }
                }
            });
        }

        window.onload = () => {
            refreshUI();
            checkFirstSetup();
        };
    </script>
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-40 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="hnb04.jpg" class="h-10 w-10 rounded-full border-2 border-blue-200">
            <h1 class="font-bold text-xl text-gray-800" data-i18n="appName">Barber Shop POS</h1>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleLang()" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-bold">عربي / EN</button>
            <button id="logout-btn" onclick="doLogout()" class="bg-red-100 text-red-700 px-4 py-2 rounded-full text-sm font-bold hidden" data-i18n="logout">Logout</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <!-- Auth View -->
        <div id="auth-view" class="mt-10">
            <div class="flex justify-center mb-8">
                <img src="hnb04.jpg" class="h-32 w-32 rounded-full shadow-lg border-4 border-white">
            </div>
            
            <!-- Setup -->
            <div id="setup-card" class="hidden max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border-t-8 border-blue-600">
                <h2 class="text-2xl font-bold text-center mb-6" data-i18n="createAdmin">Create Admin Account</h2>
                <input type="email" id="setup-email" data-i18n="email" placeholder="Email" class="w-full p-3 border rounded-xl mb-3">
                <input type="password" id="setup-password" data-i18n="password" placeholder="Password" class="w-full p-3 border rounded-xl mb-3">
                <input type="password" id="setup-confirm" data-i18n="confirmPassword" placeholder="Confirm" class="w-full p-3 border rounded-xl mb-6">
                <button onclick="registerFirstAdmin()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Register</button>
                <div class="text-center mt-4">
                    <button onclick="showLogin()" class="text-blue-500 underline text-sm" data-i18n="backToLogin">Back to Login</button>
                </div>
            </div>

            <!-- Login -->
            <div id="login-card" class="hidden max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold text-center mb-6" data-i18n="login">Login</h2>
                <input type="email" id="login-email" data-i18n="email" placeholder="Email" class="w-full p-3 border rounded-xl mb-3">
                <input type="password" id="login-password" data-i18n="password" placeholder="Password" class="w-full p-3 border rounded-xl mb-6">
                <button onclick="doLogin()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold" data-i18n="signIn">Sign In</button>
                <div class="text-center mt-4">
                    <button onclick="showSetup()" class="text-blue-500 underline text-sm" data-i18n="firstTime">First time? Register as Admin</button>
                </div>
            </div>
        </div>

        <!-- App View -->
        <div id="app-view" class="hidden space-y-4">
            <!-- Navigation -->
            <div class="bg-white p-2 rounded-xl shadow-sm flex gap-1 overflow-x-auto">
                <button id="tab-dashboard" onclick="showPanel('dashboard')" class="nav-tab flex-1 py-2 px-3 rounded-lg font-bold text-gray-700 hover:bg-gray-200 whitespace-nowrap">📊 <span data-i18n="dashboard">Dashboard</span></button>
                <button id="tab-log" onclick="showPanel('log')" class="nav-tab flex-1 py-2 px-3 rounded-lg font-bold text-gray-700 hover:bg-gray-200 whitespace-nowrap">✂️ <span data-i18n="logService">Log</span></button>
                <button id="tab-activity" onclick="showPanel('activity')" class="nav-tab flex-1 py-2 px-3 rounded-lg font-bold text-gray-700 hover:bg-gray-200 whitespace-nowrap">📋 <span data-i18n="myActivity">Activity</span></button>
                <button id="tab-reports" onclick="showPanel('reports')" class="nav-tab flex-1 py-2 px-3 rounded-lg font-bold text-gray-700 hover:bg-gray-200 whitespace-nowrap">📊 <span data-i18n="reports">Reports</span></button>
                <button id="tab-users" onclick="showPanel('users')" class="nav-tab flex-1 py-2 px-3 rounded-lg font-bold text-gray-700 hover:bg-gray-200 whitespace-nowrap hidden">👥 <span data-i18n="users">Users</span></button>
                <button id="tab-services" onclick="showPanel('services')" class="nav-tab flex-1 py-2 px-3 rounded-lg font-bold text-gray-700 hover:bg-gray-200 whitespace-nowrap hidden">⚙️ <span data-i18n="services">Services</span></button>
                <button id="tab-reset" onclick="showPanel('reset')" class="nav-tab flex-1 py-2 px-3 rounded-lg font-bold text-gray-700 hover:bg-gray-200 whitespace-nowrap hidden">🔄 <span data-i18n="reset">Reset</span></button>
            </div>

            <!-- Panels -->
            <div id="dashboard-panel" class="hidden"><div id="dashboard-content"></div></div>
            <div id="service-log-panel" class="hidden bg-white p-6 rounded-2xl shadow"><div id="log-content"></div></div>
            <div id="activity-panel" class="hidden"><div id="activity-content"></div></div>
            <div id="reports-panel" class="hidden"><div id="reports-content"></div></div>
            <div id="users-panel" class="hidden"><div id="users-content"></div></div>
            <div id="services-panel" class="hidden"><div id="services-content"></div></div>
            <div id="reset-panel" class="hidden">
                <div class="bg-white p-8 rounded-2xl shadow border-2 border-red-200">
                    <h2 class="text-2xl font-bold text-red-600 mb-4" data-i18n="reset">Factory Reset</h2>
                    <p class="text-gray-600 mb-6" data-i18n="warning">This will delete ALL data!</p>
                    <button onclick="factoryReset()" class="w-full bg-red-600 text-white p-4 rounded-xl font-bold">⚠️ <span data-i18n="performReset">Factory Reset</span></button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
